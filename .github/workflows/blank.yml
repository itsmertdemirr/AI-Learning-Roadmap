name: CI - Lint & Test

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  lint-and-test:
    runs-on: ubuntu-latest
    strategy:
      matrix:
        python-version: ["3.10", "3.11", "3.12"]

    steps:
      - name: Depoyu Checkout Et
        uses: actions/checkout@v4

      - name: Python ${{ matrix.python-version }} Kur
        uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}
          cache: "pip"

      - name: Bağımlılıkları Kur
        run: |
          python -m pip install --upgrade pip
          pip install ruff pytest
          if [ -f Resources/requirements.txt ]; then pip install -r Resources/requirements.txt; fi

      - name: Ruff ile Lint Kontrolü (PEP 8)
        run: ruff check . --output-format=github

      - name: Tüm Örnek Dosyaların Sözdizimini Doğrula
        run: |
          find . -name "*.py" -print0 | xargs -0 -n1 python -m py_compile

      - name: Birim Testlerini Çalıştır
        run: |
          if [ -d tests ]; then pytest tests/ -v; else echo "Henüz tests/ klasörü yok, atlanıyor."; fi

  notebook-check:
    runs-on: ubuntu-latest
    steps:
      - name: Depoyu Checkout Et
        uses: actions/checkout@v4

      - name: Python Kur
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Notebook JSON Geçerliliğini Kontrol Et
        run: |
          python -c "
          import json, glob
          for path in glob.glob('**/*.ipynb', recursive=True):
              with open(path, encoding='utf-8') as f:
                  json.load(f)
              print(f'✅ Geçerli: {path}')
          "
